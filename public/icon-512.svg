  <!-- Stem -->
  <line x1="256" y1="420" x2="256" y2="478" stroke="white" stroke-width="20" stroke-linecap="round"/>

  <!-- Centre vein -->
  <line x1="256" y1="148" x2="256" y2="412" stroke="#0F766E" stroke-width="10" stroke-linecap="round" opacity="0.4"/>

  <!-- Right veins -->
  <line x1="256" y1="228" x2="348" y2="174" stroke="#0F766E" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="285" x2="358" y2="250" stroke="#0F766E" stroke-width="7" stroke-linecap="round" opacity="0.30"/>
  <line x1="256" y1="338" x2="342" y2="314" stroke="#0F766E" stroke-width="6" stroke-linecap="round" opacity="0.25"/>

  <!-- Left veins -->
  <line x1="256" y1="252" x2="165" y2="204" stroke="#0F766E" stroke-width="7" stroke-linecap="round" opacity="0.30"/>
  <line x1="256" y1="308" x2="154" y2="280" stroke="#0F766E" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
  <line x1="256" y1="364" x2="170" y2="348" stroke="#0F766E" stroke-width="6" stroke-linecap="round" opacity="0.22"/>
</svg>
