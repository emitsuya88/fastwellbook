<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- FastWellBook App Icon — 512×512 -->
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0F766E"/>
  <!-- Subtle top shimmer -->
  <rect width="512" height="256" rx="112" fill="white" opacity="0.05"/>
  <rect y="200" width="512" height="312" fill="#0F766E"/>

  <!-- Leaf shape -->
  <path d="M256 420 C132 420 77 320 86 237 C95 154 157 114 256 114 C355 114 417 154 426 237 C435 320 380 420 256 420Z"
        fill="#2DD4BF"/>

